name: Build Android AAR 16KB

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.26.2'

      - name: Install Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r28c-linux.zip
          unzip android-ndk-r28c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r28c" >> $GITHUB_ENV

      - name: Install gomobile
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Prepare x/mobile dependency
        run: |
          go env GOMOD
          go get golang.org/x/mobile@latest
          go get -tool golang.org/x/mobile/cmd/gobind
          go mod tidy

      - name: Build AAR
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin

          gomobile bind \
            -target=android/arm64 \
            -androidapi 26 \
            -o libSatoshiX.aar \
            ./

      - name: Extract AAR only for validation
        run: |
          rm -rf aar_check
          mkdir aar_check
          unzip -q libSatoshiX.aar -d aar_check
          find aar_check -name "*.so"

      - name: Check 16KB alignment
        run: |
          FAILED=0

          for SO_FILE in $(find aar_check/jni -name "*.so"); do
            echo "Checking: $SO_FILE"
            $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf -l "$SO_FILE" | grep LOAD

            if $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf -l "$SO_FILE" | grep -q "0x4000"; then
              echo "OK 16KB: $SO_FILE"
            else
              echo "FAILED 16KB: $SO_FILE"
              FAILED=1
            fi
          done

          exit $FAILED

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: libSatoshiX-aar-16kb
          path: libSatoshiX.aar
