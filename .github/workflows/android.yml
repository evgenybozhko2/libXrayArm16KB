name: Build Android SO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Install Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r28c-linux.zip
          unzip android-ndk-r28c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r28c" >> $GITHUB_ENV

      - name: Install gomobile
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin

          go get golang.org/x/mobile@latest
          go get -tool golang.org/x/mobile/cmd/gobind
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest

          gomobile init

      - name: Build
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin

          go env GOMOD
          go get golang.org/x/mobile@latest
          go get -tool golang.org/x/mobile/cmd/gobind
          go mod tidy

          gomobile bind \
            -target=android/arm64 \
            -androidapi 26 \
            -o lib.aar \
            ./

      - name: Extract SO
        run: |
          unzip lib.aar -d out
          find out -name "*.so"

      - name: Check alignment
        run: |
          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf -l out/jni/arm64-v8a/*.so

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: android-so
          path: out/jni/**/*.so
